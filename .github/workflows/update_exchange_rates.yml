name: Update exchange rates SQLite

on:
  schedule:
    - cron: "5 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run exchange rate script
        run: python exchange_rates.py

      - name: Commit updated SQLite file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SQLLite/fx_rates.sqlite
          git diff --cached --quiet || git commit -m "Update FX SQLite"
          git push
